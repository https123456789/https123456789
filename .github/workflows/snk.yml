name: snk
on:
  # Schedule daily updates
  schedule: [{cron: "0 0 */7 * *"}]
  # (optional) Run workflow manually
  workflow_dispatch:
jobs:
  snk:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v2
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            github-snake.svg
