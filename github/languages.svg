<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 50">
	<style type="text/css">
		<![CDATA[
		#background-rect {
			fill: none;
			stroke: none;
		}
		.language-text-container {
			
		}
		.language-text {
			opacity: 0;
			animation-name: langauge-text-fade-in;
			animation-duration: 12s;
			animation-fill-mode: forwards;
			animation-iteration-count: infinite;
			text-anchor: middle;
			font-size: 3em;
			dominant-baseline: middle;
			fill: #58A6FF;
			font-family: Segoe UI, Ubuntu, sans-serif;
		}
		.language-text:nth-child(2) {
			animation-delay: 2s;
		}
		.language-text:nth-child(3) {
			animation-delay: 4s;
		}
		.language-text:nth-child(4) {
			animation-delay: 6s;
		}
		.language-text:nth-child(5) {
			animation-delay: 8s;
		}
		.language-text:nth-child(6) {
			animation-delay: 10s;
		}
		@keyframes langauge-text-fade-in {
			0% {
				opacity: 0;
			}
			10% {
				opacity: 1;
			}
			20% {
				opacity: 0;
			}
		}
		]]>
	</style>
	<rect width="100%" height="100%" x="0" y="0" id="background-rect"></rect>
	<g id="language-text-container">
		<text class="language-text" x="50%" y="50%">JavaScript</text>
		<text class="language-text" x="50%" y="50%">Python</text>
		<text class="language-text" x="50%" y="50%">C++</text>
		<text class="language-text" x="50%" y="50%">C</text>
		<text class="language-text" x="50%" y="50%">BrainFuck</text>
		<text class="language-text" x="50%" y="50%">PHP</text>
	</g>
</svg>